<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/image/ukraine.png" rel="icon">
    <title>ITUA</title>
    <!-- Import Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link href="/styles.css" rel="stylesheet" />
</head>
<body>
<div class="container home-container">
    <div class="lang-switcher">
        <button type="button" class="lang-btn" id="lang-en">EN</button>
        <button type="button" class="lang-btn" id="lang-uk">UA</button>
    </div>
    <div class="header">
        <div class="logo-row">
            <img src="/image/logo.png" alt="logo" class="header-logo">
            <img src="/image/artline_logo.png" alt="artline-logo" class="header-logo header-logo-artline">
        </div>
        <h1 id="title">Головне меню</h1>
    </div>
    <div class="content">
        <ul class="menu">
            <li class="main-status-group">
                <a href="/status.php" id="link-status">Статус</a>
                <a href="/start.php" id="link-start" class="main-start-link" hidden>Запустити</a>
            </li>
            <li><a href="/tools_list.php" id="link-tools">Інструменти</a></li>
            <li><a href="/settings.php" id="link-settings">Налаштування</a></li>
        </ul>
    </div>
</div>
<div class="modal-backdrop" id="user-id-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="user-id-modal-title" aria-describedby="user-id-modal-text">
        <div class="modal-badge" id="user-id-modal-badge">Підказка IT Army</div>
        <h2 id="user-id-modal-title">Потрібен User ID</h2>
        <p id="user-id-modal-text"></p>
        <div class="copy-bot-row">
            <button type="button" class="copy-bot-btn" id="copy-bot-name" aria-describedby="copy-bot-hint" aria-label="Copy bot name">@itarmy_stats_bot</button>
            <span class="copy-bot-hint" id="copy-bot-hint"></span>
        </div>
        <label class="modal-checkbox-row" for="user-id-modal-skip">
            <input type="checkbox" id="user-id-modal-skip">
            <span id="user-id-modal-skip-label">Не показувати в наступний раз</span>
        </label>
        <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn-secondary" id="user-id-modal-close">OK</button>
            <a class="modal-btn modal-btn-primary" id="user-id-modal-link" href="/user_id.php">Відкрити налаштування</a>
        </div>
    </div>
</div>
<script>
    const translations = {
        en: {
            title: "Main Menu",
            status: "Status",
            start: "Start",
            tools: "Tools",
            settings: "Settings",
            userIdMissingBadge: "IT Army helper",
            userIdMissingTitle: "User ID required",
            userIdMissingNotice: "To receive personal statistics and participate in the user leaderboard, get your personal ID from the Telegram statistics bot and enter it in the corresponding field in Settings.",
            openUserIdSettings: "Open settings",
            closeModal: "OK",
            copyBotHint: "Tap the bot name to copy",
            copiedBotHint: "Copied",
            skipUserIdModal: "Do not show next time",
            versionLabel: "Version",
            githubLabel: "GitHub",
            updateAvailable: "Update available",
            upToDate: "Up to date",
            updateNow: "Update",
            footerSlogan: "Together to freedom"
        },
        uk: {
            title: "Головне меню",
            status: "Статус",
            start: "Запустити",
            tools: "Інструменти",
            settings: "Налаштування",
            userIdMissingBadge: "Підказка IT Army",
            userIdMissingTitle: "Потрібен User ID",
            userIdMissingNotice: "Для отримання персональної статистики та участі в топі користувачів потрібно дізнатись свій персональний id у Telegram-бота статистики та вказати у відповідне поле в налаштуваннях.",
            openUserIdSettings: "Відкрити налаштування",
            closeModal: "OK",
            copyBotHint: "Натисніть на назву бота, щоб скопіювати",
            copiedBotHint: "Скопійовано",
            skipUserIdModal: "Не показувати в наступний раз",
            versionLabel: "Версія",
            githubLabel: "GitHub",
            updateAvailable: "Доступне оновлення",
            upToDate: "Актуальна",
            updateNow: "Оновити",
            footerSlogan: "Разом до свободи"
        }    };

    const langEnBtn = document.getElementById("lang-en");
    const langUkBtn = document.getElementById("lang-uk");
    const titleEl = document.getElementById("title");
    const statusEl = document.getElementById("link-status");
    const startEl = document.getElementById("link-start");
    const toolsEl = document.getElementById("link-tools");
    const settingsEl = document.getElementById("link-settings");
    const userIdModalEl = document.getElementById("user-id-modal");
    const userIdModalBadgeEl = document.getElementById("user-id-modal-badge");
    const userIdModalTitleEl = document.getElementById("user-id-modal-title");
    const userIdModalTextEl = document.getElementById("user-id-modal-text");
    const userIdModalCloseEl = document.getElementById("user-id-modal-close");
    const userIdModalLinkEl = document.getElementById("user-id-modal-link");
    const copyBotNameEl = document.getElementById("copy-bot-name");
    const copyBotHintEl = document.getElementById("copy-bot-hint");
    const userIdModalSkipEl = document.getElementById("user-id-modal-skip");
    const userIdModalSkipLabelEl = document.getElementById("user-id-modal-skip-label");
    let activeLang = "uk";
    let versionInfo = { current: "...", github: "..." };
    let copyBotHintTimer = null;
    const userIdModalPreferenceKey = "itarmybox-hide-userid-modal";

    function getCookie(name) {
        const parts = document.cookie.split("; ").find((row) => row.startsWith(name + "="));
        return parts ? decodeURIComponent(parts.split("=")[1]) : null;
    }

    function getUserIdModalHiddenPreference() {
        try {
            return window.localStorage.getItem(userIdModalPreferenceKey) === "1";
        } catch (e) {
            return false;
        }
    }

    function setUserIdModalHiddenPreference(hidden) {
        try {
            if (hidden) {
                window.localStorage.setItem(userIdModalPreferenceKey, "1");
            } else {
                window.localStorage.removeItem(userIdModalPreferenceKey);
            }
        } catch (e) {
        }
    }

    function updateLinks(lang) {
        statusEl.href = "/status.php?lang=" + encodeURIComponent(lang);
        toolsEl.href = "/tools_list.php?lang=" + encodeURIComponent(lang);
        settingsEl.href = "/settings.php?lang=" + encodeURIComponent(lang);
        if (startEl.dataset.daemon) {
            startEl.href = "/start.php?daemon=" + encodeURIComponent(startEl.dataset.daemon) + "&lang=" + encodeURIComponent(lang);
        } else {
            startEl.href = "/start.php?lang=" + encodeURIComponent(lang);
        }
        const footerUpdateActionEl = document.getElementById("footer-update-action");
        if (footerUpdateActionEl) {
            footerUpdateActionEl.href = "/settings.php?lang=" + encodeURIComponent(lang);
        }
        userIdModalLinkEl.href = "/user_id.php?lang=" + encodeURIComponent(lang);
    }

    function applyLang(lang) {
        activeLang = (lang === "uk" || lang === "en") ? lang : "en";
        const text = translations[activeLang];
        titleEl.textContent = text.title;
        statusEl.textContent = text.status;
        startEl.textContent = text.start;
        toolsEl.textContent = text.tools;
        settingsEl.textContent = text.settings;
        const footerSloganEl = document.getElementById("footer-slogan");
        if (footerSloganEl) {
            footerSloganEl.textContent = text.footerSlogan;
        }
        const footerVersionCurrentLabelEl = document.getElementById("footer-version-current-label");
        const footerVersionGithubLabelEl = document.getElementById("footer-version-github-label");
        const footerVersionCurrentEl = document.getElementById("footer-version-current");
        const footerVersionGithubEl = document.getElementById("footer-version-github");
        const footerUpdateStateEl = document.getElementById("footer-update-state");
        const footerUpdateActionEl = document.getElementById("footer-update-action");
        if (footerVersionCurrentLabelEl) footerVersionCurrentLabelEl.textContent = text.versionLabel;
        if (footerVersionGithubLabelEl) footerVersionGithubLabelEl.textContent = text.githubLabel;
        if (footerVersionCurrentEl) footerVersionCurrentEl.textContent = versionInfo.current;
        if (footerVersionGithubEl) footerVersionGithubEl.textContent = versionInfo.github;
        const haveBoth = versionInfo.current !== "unknown" && versionInfo.github !== "unknown" && versionInfo.current !== "..." && versionInfo.github !== "...";
        const updateNeeded = haveBoth && versionInfo.current !== versionInfo.github;
        if (footerUpdateStateEl) {
            footerUpdateStateEl.textContent = updateNeeded ? text.updateAvailable : text.upToDate;
            footerUpdateStateEl.classList.toggle("update-needed", updateNeeded);
            footerUpdateStateEl.classList.toggle("up-to-date", !updateNeeded);
        }
        if (footerUpdateActionEl) {
            footerUpdateActionEl.textContent = text.updateNow;
            footerUpdateActionEl.classList.toggle("visible", updateNeeded);
        }
        userIdModalTitleEl.textContent = text.userIdMissingTitle;
        userIdModalBadgeEl.textContent = text.userIdMissingBadge;
        userIdModalTextEl.textContent = text.userIdMissingNotice;
        userIdModalCloseEl.textContent = text.closeModal;
        userIdModalLinkEl.textContent = text.openUserIdSettings;
        copyBotHintEl.textContent = text.copyBotHint;
        userIdModalSkipLabelEl.textContent = text.skipUserIdModal;
        langEnBtn.classList.toggle("active", activeLang === "en");
        langUkBtn.classList.toggle("active", activeLang === "uk");
        updateLinks(activeLang);
    }

    async function copyBotName() {
        const botName = copyBotNameEl.textContent.trim();
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(botName);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = botName;
                textArea.setAttribute("readonly", "");
                textArea.style.position = "absolute";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
            }
            copyBotHintEl.textContent = translations[activeLang].copiedBotHint;
            copyBotNameEl.classList.add("copied");
            if (copyBotHintTimer) {
                window.clearTimeout(copyBotHintTimer);
            }
            copyBotHintTimer = window.setTimeout(() => {
                copyBotHintEl.textContent = translations[activeLang].copyBotHint;
                copyBotNameEl.classList.remove("copied");
            }, 1800);
        } catch (e) {
            copyBotHintEl.textContent = botName;
        }
    }

    function showUserIdModal() {
        userIdModalSkipEl.checked = getUserIdModalHiddenPreference();
        userIdModalEl.hidden = false;
        document.body.classList.add("modal-open");
        userIdModalCloseEl.focus();
    }

    function hideUserIdModal() {
        setUserIdModalHiddenPreference(userIdModalSkipEl.checked);
        userIdModalEl.hidden = true;
        document.body.classList.remove("modal-open");
    }

    async function fetchVersionInfo() {
        try {
            const response = await fetch("/version_info.php", { cache: "no-store" });
            const data = await response.json();
            if (!data || data.ok !== true) {
                return;
            }
            versionInfo = {
                current: data.current || "unknown",
                github: data.github || "unknown"
            };
            applyLang(activeLang);
        } catch (e) {
        }
    }

    async function refreshMainStatusIndicator() {
        try {
            const response = await fetch("/status.php?ajax=1&lang=" + encodeURIComponent(activeLang), { cache: "no-store" });
            const data = await response.json();
            const isActive = !!(data && data.ok === true && data.activeModule);
            const selectedModule = (data && data.ok === true && typeof data.selectedModule === "string" && data.selectedModule) ? data.selectedModule : "";
            statusEl.classList.toggle("main-status-active", isActive);
            statusEl.classList.toggle("main-status-inactive", !isActive);
            if (selectedModule) {
                startEl.dataset.daemon = selectedModule;
                startEl.hidden = false;
            } else {
                delete startEl.dataset.daemon;
                startEl.hidden = true;
            }
            updateLinks(activeLang);
        } catch (e) {
            statusEl.classList.remove("main-status-active");
            statusEl.classList.add("main-status-inactive");
            delete startEl.dataset.daemon;
            startEl.hidden = true;
        }
    }

    async function notifyIfUserIdMissing() {
        try {
            const response = await fetch("/user_id.php?ajax=status", { cache: "no-store" });
            const data = await response.json();
            if (data && data.ok === true && data.userIdConfigured === false && !getUserIdModalHiddenPreference()) {
                showUserIdModal();
            } else if (data && data.ok === true && data.userIdConfigured === true) {
                setUserIdModalHiddenPreference(false);
            }
        } catch (e) {
        }
    }

    function setLang(lang) {
        document.cookie = "lang=" + encodeURIComponent(lang) + "; path=/; max-age=31536000";
        applyLang(lang);
    }

    const params = new URLSearchParams(window.location.search);
    const initialLang = params.get("lang") || getCookie("lang") || "uk";
    applyLang(initialLang);
    fetchVersionInfo();
    refreshMainStatusIndicator();
    notifyIfUserIdMissing();
    setInterval(refreshMainStatusIndicator, 5000);

    function closeUserIdModalFromAction(event) {
        event.preventDefault();
        event.stopPropagation();
        hideUserIdModal();
    }

    langEnBtn.addEventListener("click", () => setLang("en"));
    langUkBtn.addEventListener("click", () => setLang("uk"));
    userIdModalCloseEl.addEventListener("click", closeUserIdModalFromAction);
    userIdModalCloseEl.addEventListener("pointerup", closeUserIdModalFromAction);
    userIdModalCloseEl.addEventListener("touchend", closeUserIdModalFromAction, { passive: false });
    copyBotNameEl.addEventListener("click", copyBotName);
    userIdModalEl.addEventListener("click", (event) => {
        if (event.target === userIdModalEl) {
            hideUserIdModal();
        }
    });
    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !userIdModalEl.hidden) {
            hideUserIdModal();
        }
    });
</script>
<footer class="app-footer">
    <div>&copy; 2022-<span id="copyright-year"></span> IT Army of Ukraine. <span id="footer-slogan">Разом до свободи</span>.</div>
    <div class="footer-version"><span id="footer-version-current-label">Версія</span>: <span id="footer-version-current">...</span> | <span id="footer-version-github-label">GitHub</span>: <span id="footer-version-github">...</span></div>
    <div class="footer-update-row"><span id="footer-update-state" class="footer-update-state up-to-date">Актуальна</span> <a id="footer-update-action" class="footer-update-action" href="/settings.php">Оновити</a></div>
</footer>
<script>
    document.getElementById("copyright-year").textContent = String(new Date().getFullYear());
</script>
</body>
</html>
